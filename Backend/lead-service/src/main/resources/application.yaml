spring:
  application:
    name: lead-service

  datasource:
    url: jdbc:mysql://localhost:3306/lead_management_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8089

app:
  cookie:
    secure: false
  bootstrap-admin:
    enabled: false

jwt:
  secret: qwertyuiopasfhjvsahjdsvfdvnjkndfkjvjdkfnvklnklfdvkjndfkjvnjkdnfjkvnkldfnvklndklfnvkldfnvklndklfnvdf
  access:
    expiration: 3600000
  internal:
    expiration: 300000
  refresh:
    expiration: 604800000

security:
  allowed-services:
    - gateway
    - lead-service
  publicEndpoints:
    - /api/leads/auth/login
    - /api/leads/auth/refresh
    - /api/leads/auth/logout