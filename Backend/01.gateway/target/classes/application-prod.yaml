# Development JWT Configuration
jwt:
  secret: PRODUCTION_JWT_SECRET
  access:
    expiration: 900000   # 15 minutes

spring:
  cloud:
    gateway:
      routes:
        # ==========================
        # Auth Service Routing
        # ==========================
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        # ==========================
        # Lead Service Routing
        # ==========================
        - id: lead-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/leads/**

        # ==========================
        # AI Service Routing
        # ==========================
        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/ai/**

        # ==========================
        # Notification Service
        # ==========================
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**